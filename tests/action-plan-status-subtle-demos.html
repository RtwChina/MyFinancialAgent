<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Action Status Subtle Demos</title>
    <style>
      :root {
        --text: #0f172a;
        --muted: #64748b;
        --line: rgba(15, 23, 42, 0.08);
        --selected: rgba(37, 99, 235, 0.07);
        --hold: #2563eb;
        --open: #16a34a;
        --closed: #64748b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f6f8fb;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 18px;
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .demo {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      .demo-head {
        display: grid;
        gap: 4px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .demo-title {
        margin: 0;
        font-size: 15px;
      }

      .demo-note {
        color: var(--muted);
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
        font-size: 14px;
      }

      th {
        background: #f8fafc;
        color: #475569;
        font-size: 13px;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      tr.selected td {
        background: var(--selected);
      }

      tr.selected td:first-child {
        box-shadow: inset 4px 0 0 #2563eb;
      }

      .target {
        display: grid;
        justify-items: start;
        gap: 5px;
        min-height: 54px;
        align-content: center;
      }

      .symbol {
        display: block;
        color: #0f172a;
        font-size: 22px;
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .status {
        line-height: 1.2;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .hold { color: var(--hold); }
      .open { color: var(--open); }
      .closed { color: var(--closed); }

      .demo-a .status {
        font-size: 12px;
        font-weight: 750;
        opacity: 0.82;
      }

      .demo-b .status {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: #64748b;
        font-size: 12px;
        font-weight: 700;
      }

      .demo-b .status::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
      }

      .demo-b .status.hold::before { background: var(--hold); }
      .demo-b .status.open::before { background: var(--open); }
      .demo-b .status.closed::before { background: var(--closed); }

      .demo-c .status {
        display: inline-flex;
        align-items: center;
        min-height: 18px;
        padding: 1px 7px;
        border-radius: 999px;
        border: 1px solid currentColor;
        background: rgba(248, 250, 252, 0.7);
        font-size: 12px;
        font-weight: 750;
        opacity: 0.78;
      }

      @media (max-width: 1100px) {
        .demo-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>标的在上，状态在下：低权重 demo</h1>
      <section class="demo-grid">
        <article class="demo demo-a">
          <div class="demo-head">
            <h2 class="demo-title">A. 纯文字状态</h2>
            <span class="demo-note">最克制，状态只是辅助信息</span>
          </div>
          <table>
            <thead>
              <tr><th>标的 / 动作</th></tr>
            </thead>
            <tbody>
              <tr>
                <td><div class="target"><span class="symbol">MSFT</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">AMD</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr class="selected">
                <td><div class="target"><span class="symbol">LITE</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">GE</span><span class="status open">准备开仓</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">BABA</span><span class="status closed">已清仓复盘</span></div></td>
              </tr>
            </tbody>
          </table>
        </article>

        <article class="demo demo-b">
          <div class="demo-head">
            <h2 class="demo-title">B. 小圆点状态</h2>
            <span class="demo-note">颜色更弱，只保留一个状态提示点</span>
          </div>
          <table>
            <thead>
              <tr><th>标的 / 动作</th></tr>
            </thead>
            <tbody>
              <tr>
                <td><div class="target"><span class="symbol">MSFT</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">AMD</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr class="selected">
                <td><div class="target"><span class="symbol">LITE</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">GE</span><span class="status open">准备开仓</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">BABA</span><span class="status closed">已清仓复盘</span></div></td>
              </tr>
            </tbody>
          </table>
        </article>

        <article class="demo demo-c">
          <div class="demo-head">
            <h2 class="demo-title">C. 极淡小标签</h2>
            <span class="demo-note">保留标签形状，但降亮度和尺寸</span>
          </div>
          <table>
            <thead>
              <tr><th>标的 / 动作</th></tr>
            </thead>
            <tbody>
              <tr>
                <td><div class="target"><span class="symbol">MSFT</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">AMD</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr class="selected">
                <td><div class="target"><span class="symbol">LITE</span><span class="status hold">持仓观察</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">GE</span><span class="status open">准备开仓</span></div></td>
              </tr>
              <tr>
                <td><div class="target"><span class="symbol">BABA</span><span class="status closed">已清仓复盘</span></div></td>
              </tr>
            </tbody>
          </table>
        </article>
      </section>
    </main>
  </body>
</html>
