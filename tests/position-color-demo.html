<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>仓位颜色 DEMO</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 32px; background: #f8fafc; color: #0f172a; }
  h2 { font-size: 1rem; font-weight: 700; margin: 36px 0 12px; color: #64748b; letter-spacing: .05em; text-transform: uppercase; }
  h2:first-child { margin-top: 0; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill {
    display: inline-block;
    padding: 3px 11px;
    border-radius: 7px;
    font-size: 0.82rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .label { font-size: 0.74rem; color: #94a3b8; margin-top: 4px; }
  .group { display: flex; flex-direction: column; align-items: center; gap: 2px; }

  /* ── DEMO A：单色渐变（绿→黄→橙→红），pill 背景 ── */
  .a-0    { color: #94a3b8; background: rgba(148,163,184,.12); }
  .a-5    { color: #16a34a; background: rgba(22,163,74,.10); }
  .a-10   { color: #15803d; background: rgba(21,128,61,.13); }
  .a-15   { color: #a16207; background: rgba(161,98,7,.12); }
  .a-20   { color: #c2410c; background: rgba(194,65,12,.12); }
  .a-25   { color: #b91c1c; background: rgba(185,28,28,.13); }
  .a-30   { color: #991b1b; background: rgba(153,27,27,.15); }
  .a-max  { color: #fff;    background: #991b1b; }

  /* ── DEMO B：左边色条（border-left），背景极淡 ── */
  .b-0    { border-left: 3px solid #cbd5e1; background: #f1f5f9; color: #64748b; border-radius: 0 7px 7px 0; padding-left: 8px; }
  .b-5    { border-left: 3px solid #86efac; background: #f0fdf4; color: #166534; border-radius: 0 7px 7px 0; padding-left: 8px; }
  .b-10   { border-left: 3px solid #4ade80; background: #dcfce7; color: #15803d; border-radius: 0 7px 7px 0; padding-left: 8px; }
  .b-15   { border-left: 3px solid #fbbf24; background: #fefce8; color: #92400e; border-radius: 0 7px 7px 0; padding-left: 8px; }
  .b-20   { border-left: 3px solid #fb923c; background: #fff7ed; color: #9a3412; border-radius: 0 7px 7px 0; padding-left: 8px; }
  .b-25   { border-left: 3px solid #f87171; background: #fef2f2; color: #991b1b; border-radius: 0 7px 7px 0; padding-left: 8px; }
  .b-30   { border-left: 3px solid #ef4444; background: #fee2e2; color: #7f1d1d; border-radius: 0 7px 7px 0; padding-left: 8px; }
  .b-max  { border-left: 3px solid #b91c1c; background: #fca5a5; color: #450a0a; border-radius: 0 7px 7px 0; padding-left: 8px; }

  /* ── DEMO C：填充色块，像热力图，纯色背景 ── */
  .c-0    { color: #475569; background: #e2e8f0; }
  .c-5    { color: #14532d; background: #bbf7d0; }
  .c-10   { color: #14532d; background: #86efac; }
  .c-15   { color: #713f12; background: #fde68a; }
  .c-20   { color: #7c2d12; background: #fdba74; }
  .c-25   { color: #7f1d1d; background: #fca5a5; }
  .c-30   { color: #450a0a; background: #f87171; }
  .c-max  { color: #fff;    background: #dc2626; }

  hr { border: none; border-top: 1px solid #e2e8f0; margin: 40px 0; }
</style>
</head>
<body>

<h2>DEMO A — 柔和背景 pill（绿→黄→橙→深红）</h2>
<div class="row">
  <div class="group"><span class="pill a-0">0%</span><span class="label">空仓</span></div>
  <div class="group"><span class="pill a-5">0-5%</span><span class="label">试探</span></div>
  <div class="group"><span class="pill a-10">5%-10%</span><span class="label">轻仓</span></div>
  <div class="group"><span class="pill a-15">10%-15%</span><span class="label">中轻</span></div>
  <div class="group"><span class="pill a-20">15%-20%</span><span class="label">中仓</span></div>
  <div class="group"><span class="pill a-25">20%-25%</span><span class="label">中重</span></div>
  <div class="group"><span class="pill a-30">25%-30%</span><span class="label">重仓</span></div>
  <div class="group"><span class="pill a-max">&gt;30%</span><span class="label">超重</span></div>
</div>

<hr>

<h2>DEMO B — 左色条（border-left），背景极淡</h2>
<div class="row">
  <div class="group"><span class="pill b-0">0%</span><span class="label">空仓</span></div>
  <div class="group"><span class="pill b-5">0-5%</span><span class="label">试探</span></div>
  <div class="group"><span class="pill b-10">5%-10%</span><span class="label">轻仓</span></div>
  <div class="group"><span class="pill b-15">10%-15%</span><span class="label">中轻</span></div>
  <div class="group"><span class="pill b-20">15%-20%</span><span class="label">中仓</span></div>
  <div class="group"><span class="pill b-25">20%-25%</span><span class="label">中重</span></div>
  <div class="group"><span class="pill b-30">25%-30%</span><span class="label">重仓</span></div>
  <div class="group"><span class="pill b-max">&gt;30%</span><span class="label">超重</span></div>
</div>

<hr>

<h2>DEMO C — 热力色块（填充色，对比强）</h2>
<div class="row">
  <div class="group"><span class="pill c-0">0%</span><span class="label">空仓</span></div>
  <div class="group"><span class="pill c-5">0-5%</span><span class="label">试探</span></div>
  <div class="group"><span class="pill c-10">5%-10%</span><span class="label">轻仓</span></div>
  <div class="group"><span class="pill c-15">10%-15%</span><span class="label">中轻</span></div>
  <div class="group"><span class="pill c-20">15%-20%</span><span class="label">中仓</span></div>
  <div class="group"><span class="pill c-25">20%-25%</span><span class="label">中重</span></div>
  <div class="group"><span class="pill c-30">25%-30%</span><span class="label">重仓</span></div>
  <div class="group"><span class="pill c-max">&gt;30%</span><span class="label">超重</span></div>
</div>

</body>
</html>
