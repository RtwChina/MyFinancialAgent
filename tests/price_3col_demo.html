<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三列并列方案</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6fb; color: #1e293b; padding: 20px; }
h1 { font-size: 1.15rem; margin-bottom: 6px; }
h2 { font-size: 0.88rem; margin-bottom: 20px; color: #64748b; font-weight: 500; }
.demo-section { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.demo-label { display: inline-block; background: #3b82f6; color: #fff; font-size: 0.72rem; padding: 2px 10px; border-radius: 99px; margin-bottom: 10px; }

.snapshot-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; cursor: pointer; user-select: none; }
.snapshot-head h3 { font-size: 1rem; font-weight: 700; }
.snapshot-head small { color: #94a3b8; font-size: 0.78rem; }
.collapse-hint { font-size: 0.7rem; color: #94a3b8; opacity: 0.6; }
.snapshot-head:hover .collapse-hint { opacity: 1; }

/* 三列并列核心 */
.price-grid-3col {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  align-items: start;
}

.price-section {
  border: 1px solid rgba(15,23,42,0.08);
  border-radius: 14px;
  background: rgba(255,255,255,0.62);
  padding: 10px 12px;
}
.price-section-head {
  display: flex; flex-direction: column; gap: 2px;
  cursor: pointer; list-style: none; position: relative; padding-left: 14px;
  user-select: none;
}
.price-section-head::-webkit-details-marker { display: none; }
.price-section-head > span:first-child { font-size: 0.88rem; font-weight: 800; color: #4e5d76; }
.price-section-summary { color: #94a3b8; font-size: 0.72rem; }
details[open] > summary > .price-section-summary { display: none; }
.price-section-head::before {
  content: "▸"; font-size: 0.65rem; position: absolute; left: 0; top: 3px; transition: transform 0.2s;
}
details[open] > .price-section-head::before { transform: rotate(90deg); }
.price-section-body { margin-top: 8px; }

.up { color: #157347 !important; }
.down { color: #b42318 !important; }

/* ===== 方案 1: 紧凑行 ===== */
.s1 .price-list { display: flex; flex-direction: column; gap: 0; }
.s1 .pc {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 0; border-bottom: 1px solid rgba(15,23,42,0.04);
}
.s1 .pc:last-child { border-bottom: none; }
.s1 .pc-left { display: flex; align-items: baseline; gap: 4px; min-width: 0; }
.s1 .pc-name { font-size: 0.8rem; font-weight: 600; color: #4f5d75; white-space: nowrap; }
.s1 .pc-sym { font-size: 0.65rem; color: #b0b8c8; }
.s1 .pc-right { display: flex; align-items: baseline; gap: 6px; flex-shrink: 0; }
.s1 .pc-price { font-size: 0.78rem; font-weight: 600; color: #475569; }
.s1 .pc-chg { font-size: 0.76rem; font-weight: 700; min-width: 52px; text-align: right; }

/* ===== 方案 2: 迷你卡片 ===== */
.s2 .price-list { display: flex; flex-direction: column; gap: 4px; }
.s2 .pc {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 8px; border-radius: 8px; background: #f8fafc;
}
.s2 .pc-left { display: flex; align-items: baseline; gap: 4px; min-width: 0; }
.s2 .pc-name { font-size: 0.78rem; font-weight: 600; color: #4f5d75; }
.s2 .pc-sym { font-size: 0.64rem; color: #b0b8c8; }
.s2 .pc-right { display: flex; align-items: baseline; gap: 6px; flex-shrink: 0; }
.s2 .pc-price { font-size: 0.78rem; font-weight: 600; color: #475569; }
.s2 .pc-chg { font-size: 0.74rem; font-weight: 700; min-width: 50px; text-align: right; }

/* ===== 方案 3: 涨跌色条 ===== */
.s3 .price-list { display: flex; flex-direction: column; gap: 3px; }
.s3 .pc {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; border-radius: 6px; border-left: 3px solid #cbd5e1;
}
.s3 .pc.is-up { border-left-color: #157347; background: rgba(21,115,71,0.04); }
.s3 .pc.is-down { border-left-color: #b42318; background: rgba(180,35,24,0.03); }
.s3 .pc-left { display: flex; align-items: baseline; gap: 4px; min-width: 0; }
.s3 .pc-name { font-size: 0.78rem; font-weight: 600; color: #4f5d75; }
.s3 .pc-sym { font-size: 0.64rem; color: #b0b8c8; }
.s3 .pc-right { display: flex; align-items: baseline; gap: 6px; flex-shrink: 0; }
.s3 .pc-price { font-size: 0.76rem; font-weight: 600; color: #475569; }
.s3 .pc-chg { font-size: 0.74rem; font-weight: 700; min-width: 50px; text-align: right; }

/* ===== 方案 4: 双行紧凑 ===== */
.s4 .price-list { display: flex; flex-direction: column; gap: 0; }
.s4 .pc {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0; border-bottom: 1px solid rgba(15,23,42,0.04);
}
.s4 .pc:last-child { border-bottom: none; }
.s4 .pc-left { display: flex; flex-direction: column; min-width: 0; }
.s4 .pc-name { font-size: 0.76rem; font-weight: 600; color: #4f5d75; line-height: 1.2; }
.s4 .pc-sym { font-size: 0.6rem; color: #b0b8c8; }
.s4 .pc-right { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
.s4 .pc-price { font-size: 0.78rem; font-weight: 700; color: #334155; line-height: 1.2; }
.s4 .pc-chg { font-size: 0.68rem; font-weight: 700; }

/* ===== 方案 5: 徽章紧凑 ===== */
.s5 .price-list { display: flex; flex-direction: column; gap: 3px; }
.s5 .pc {
  display: flex; align-items: center; justify-content: space-between; padding: 3px 0;
}
.s5 .pc-left { display: flex; align-items: baseline; gap: 3px; min-width: 0; }
.s5 .pc-name { font-size: 0.76rem; font-weight: 600; color: #4f5d75; }
.s5 .pc-sym { font-size: 0.62rem; color: #b0b8c8; }
.s5 .pc-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.s5 .pc-price { font-size: 0.74rem; font-weight: 600; color: #475569; }
.s5 .pc-badge {
  font-size: 0.66rem; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  color: #fff; line-height: 1.4;
}
.s5 .pc-badge.up { background: #157347; }
.s5 .pc-badge.down { background: #b42318; }
.s5 .pc-badge.flat { background: #94a3b8; }

@media (max-width: 900px) {
  .price-grid-3col { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>三列并列 — 5 种卡片风格</h1>
<h2>大盘 / 板块 / 个股三列等宽并排，点击标题折叠全部</h2>

<script>
const mock = {
  index: [
    { n: "标普500", s: "GSPC", p: 6624.70, c: -1.36 },
    { n: "纳斯达克", s: "IXIC", p: 22152.42, c: -1.46 },
    { n: "道琼斯", s: "DJI", p: 46225.15, c: -1.63 },
    { n: "恐慌指数", s: "VIX", p: 25.09, c: 12.16 },
    { n: "上证指数", s: "SSE", p: 3426.43, c: 0.23 },
    { n: "恒生指数", s: "HSI", p: 24218.56, c: -0.89 },
    { n: "美元指数", s: "DXY", p: 103.42, c: 0.15 },
    { n: "黄金期货", s: "GOLD", p: 3045.60, c: 1.02 },
    { n: "布伦特原油", s: "BZ=F", p: 70.82, c: -0.54 },
    { n: "十年期国债", s: "TNX", p: 4.287, c: -0.12 },
  ],
  sector: [
    { n: "科技板块", s: "XLK", p: 218.34, c: -2.10 },
    { n: "半导体", s: "SOXX", p: 198.76, c: -3.20 },
    { n: "能源板块", s: "XLE", p: 87.42, c: 0.80 },
    { n: "金融板块", s: "XLF", p: 47.89, c: -1.10 },
    { n: "可选消费", s: "XLY", p: 196.23, c: -0.60 },
    { n: "通信服务", s: "XLC", p: 102.15, c: -1.80 },
  ],
  stock: [
    { n: "微软", s: "MSFT", p: 412.35, c: -1.50 },
    { n: "谷歌", s: "GOOGL", p: 168.92, c: -2.30 },
    { n: "美光科技", s: "MU", p: 94.18, c: -4.10 },
    { n: "阿里巴巴", s: "9988.HK", p: 134.80, c: 0.70 },
    { n: "紫金矿业", s: "601899.SS", p: 18.56, c: 1.20 },
  ],
};
const secMeta = [
  { key: "index", label: "大盘分析" },
  { key: "sector", label: "板块分析" },
  { key: "stock", label: "个股深度研究" },
];
function fp(p) {
  if (p >= 1000) return p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (p >= 10) return p.toFixed(2);
  return p.toFixed(3);
}
function sumLine(items) {
  return items.slice(0, 3).map(i => `${i.n} ${i.c > 0 ? "+" : ""}${i.c.toFixed(1)}%`).join(" · ");
}

const schemes = [
  { cls: "s1", label: "方案 1：紧凑行 + 下划线", desc: "最简洁，分割线分隔" },
  { cls: "s2", label: "方案 2：迷你圆角卡片", desc: "浅灰背景小卡片" },
  { cls: "s3", label: "方案 3：涨跌色条", desc: "左侧 3px 颜色条 + 浅底色" },
  { cls: "s4", label: "方案 4：双行布局", desc: "名称/代码上下排，价格/涨跌右侧上下排" },
  { cls: "s5", label: "方案 5：徽章标签", desc: "涨跌幅用彩色徽章显示" },
];

function buildCard(item, cls) {
  const dir = item.c > 0 ? "up" : item.c < 0 ? "down" : "";
  const sign = item.c > 0 ? "+" : "";
  if (cls === "s4") {
    return `<div class="pc">
      <div class="pc-left"><span class="pc-name">${item.n}</span><span class="pc-sym">${item.s}</span></div>
      <div class="pc-right"><span class="pc-price">${fp(item.p)}</span><span class="pc-chg ${dir}">${sign}${item.c.toFixed(2)}%</span></div>
    </div>`;
  }
  if (cls === "s3") {
    return `<div class="pc is-${dir || 'flat'}">
      <div class="pc-left"><span class="pc-name">${item.n}</span><span class="pc-sym">${item.s}</span></div>
      <div class="pc-right"><span class="pc-price">${fp(item.p)}</span><span class="pc-chg ${dir}">${sign}${item.c.toFixed(2)}%</span></div>
    </div>`;
  }
  if (cls === "s5") {
    return `<div class="pc">
      <div class="pc-left"><span class="pc-name">${item.n}</span><span class="pc-sym">${item.s}</span></div>
      <div class="pc-right"><span class="pc-price">${fp(item.p)}</span><span class="pc-badge ${dir || 'flat'}">${sign}${item.c.toFixed(2)}%</span></div>
    </div>`;
  }
  return `<div class="pc">
    <div class="pc-left"><span class="pc-name">${item.n}</span><span class="pc-sym">${item.s}</span></div>
    <div class="pc-right"><span class="pc-price">${fp(item.p)}</span><span class="pc-chg ${dir}">${sign}${item.c.toFixed(2)}%</span></div>
  </div>`;
}

function toggleAll(head) {
  const grid = head.closest("section").querySelector(".price-grid-3col");
  const all = grid.querySelectorAll("details.price-section");
  const anyOpen = [...all].some(d => d.open);
  all.forEach(d => d.open = !anyOpen);
  head.querySelector(".collapse-hint").textContent = anyOpen ? "▸ 点击展开" : "▾ 点击折叠";
}

schemes.forEach(({ cls, label, desc }) => {
  const sec = document.createElement("div");
  sec.className = `demo-section ${cls}`;
  sec.innerHTML = `<span class="demo-label">${label}</span>
    <section>
      <div class="snapshot-head" onclick="toggleAll(this)">
        <div><h3>当日价格</h3><small>${desc}</small></div>
        <span class="collapse-hint">▾ 点击折叠</span>
      </div>
      <div class="price-grid-3col"></div>
    </section>`;
  const grid = sec.querySelector(".price-grid-3col");
  secMeta.forEach(({ key, label: l }) => {
    const items = mock[key];
    const det = document.createElement("details");
    det.className = "price-section";
    det.open = true;
    det.innerHTML = `<summary class="price-section-head"><span>${l}</span><span class="price-section-summary">${sumLine(items)}</span></summary>
      <div class="price-section-body"><div class="price-list">${items.map(i => buildCard(i, cls)).join("")}</div></div>`;
    grid.appendChild(det);
  });
  document.body.appendChild(sec);
});
</script>
</body>
</html>
