<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Financial Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Cloudflare Review Console</p>
          <h1>股票复盘工作台</h1>
          <p class="hero-copy">
            一处查看历史复盘，一处处理待复盘日期。数据来自 Cloudflare D1，页面直接调用 Workers API。
          </p>
        </div>
        <div class="hero-card">
          <div class="hero-stat">
            <span>当前模式</span>
            <strong>私有复盘</strong>
          </div>
          <div class="hero-stat">
            <span>数据源</span>
            <strong>D1 + Workers</strong>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="panel-header">
            <h2>待复盘日期</h2>
            <button id="refreshPendingBtn" class="ghost">刷新</button>
          </div>
          <div id="pendingState" class="muted">加载中...</div>
          <div id="pendingList" class="date-list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>复盘查询</h2>
            <button id="refreshReviewsBtn" class="ghost">刷新</button>
          </div>
          <form id="filtersForm" class="filters">
            <label>
              状态
              <select name="status">
                <option value="">全部</option>
                <option value="draft">草稿</option>
                <option value="completed">已完成</option>
              </select>
            </label>
            <label>
              开始日期
              <input type="date" name="from" />
            </label>
            <label>
              结束日期
              <input type="date" name="to" />
            </label>
            <button type="submit">查询</button>
          </form>
          <div id="reviewsList" class="review-list"></div>
        </section>

        <section class="panel wide">
          <div class="panel-header">
            <h2 id="editorTitle">复盘编辑区</h2>
            <div class="action-row">
              <button id="saveDraftBtn">保存草稿</button>
              <button id="completeBtn" class="secondary">标记完成</button>
            </div>
          </div>
          <div id="editorEmpty" class="empty-state">
            先从左侧选择一个待复盘日期，或从查询结果中打开某一天。
          </div>

          <div id="editorContent" class="editor hidden">
            <div class="meta-grid">
              <div class="meta-card">
                <span>复盘日期</span>
                <strong id="archiveDateLabel">-</strong>
              </div>
              <div class="meta-card">
                <span>状态</span>
                <strong id="reviewStatusLabel">draft</strong>
              </div>
              <div class="meta-card">
                <span>回填来源</span>
                <strong id="carryForwardLabel">-</strong>
              </div>
            </div>

            <div class="bootstrap-grid">
              <article class="bootstrap-card">
                <h3>当日价格</h3>
                <div id="pricesBox" class="data-box"></div>
              </article>
              <article class="bootstrap-card">
                <h3>新闻窗口</h3>
                <div id="newsWindowBox" class="data-box"></div>
              </article>
              <article class="bootstrap-card">
                <h3>新闻分析</h3>
                <div id="analysisBox" class="data-box"></div>
              </article>
              <article class="bootstrap-card">
                <h3>上一复盘日参考</h3>
                <div id="carryForwardBox" class="data-box"></div>
              </article>
            </div>

            <form id="reviewForm" class="review-form">
              <label>
                历史价位复盘
                <textarea name="histPriceLevel" rows="4"></textarea>
              </label>
              <label>
                新闻总结
                <textarea name="newsSummary" rows="4"></textarea>
              </label>
              <label>
                大盘流动性追踪
                <textarea name="marketSentiment" rows="4"></textarea>
              </label>
              <label>
                大宗商品与板块轮动
                <textarea name="sectorRotation" rows="4"></textarea>
              </label>
              <label>
                个股与资产操作计划
                <textarea name="assetPlan" rows="4"></textarea>
              </label>
              <label>
                自定义补充内容
                <textarea name="customNotes" rows="4"></textarea>
              </label>
              <label>
                深度思考与交易总结
                <textarea name="tradingSummary" rows="6"></textarea>
              </label>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
