schema: spec-driven

context: |
  角色：具备架构师思维的高级开发工程师。
  执行任何改动前，先读取项目文档，再行动。
  自检原则：交付前回看规范，发现冲突先修正再给结论。

rules:
  proposal:
    - 明确需求边界、优先级、不做项
    - 说明潜在风险和环境划分
    - 识别受影响的模块和接口
    - 说明对现有功能的影响

  specs:
    - 场景必须用 Given/When/Then 格式
    - 涉及主链路的需求，需说明对应冒烟用例的触发条件
    - 第三方接口需分类：A 类（可控）/ B 类（不可控），并说明 mock 策略

  design:
    - 明确架构方案、数据结构、环境划分
    - 说明测试环境与生产环境的隔离边界
    - 运行时必须有统一环境标识 APP_ENV

  tasks:
    - 按阶段拆分：需求 → 设计 → 开发 → 测试 → 发布
    - 涉及主链路改动时，追加"更新冒烟文档+集成测试"任务，必须读取 ./tests/standards 文件夹下的规范 生成测试用例集，然后进行测试
    - 所有涉及到测试的数据或脚本等都放到 .tests/ 文件夹下面
    - 每个 task 粒度控制在 2 小时内
    - 发布任务必须包含发布前检查清单
