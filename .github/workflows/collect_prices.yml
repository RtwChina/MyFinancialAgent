name: 采集股票价格数据

on:
  schedule:
    # 每天北京时间 05:00 执行 (UTC 21:00)
    # 美股收盘后约30分钟
    - cron: '0 21 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  collect-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行价格采集
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_ID: "qwen3.5-plus"
          LLM_BATCH_MODEL_ID: "qwen3.5-plus"
          LLM_SUMMARY_MODEL_ID: "qwen3.5-plus"
          SKIP_LLM: "true"
          ENABLE_REMOTE_WRITE: "true"
          INGEST_API_BASE_URL: ${{ secrets.INGEST_API_BASE_URL }}
          INGEST_API_TOKEN: ${{ secrets.INGEST_API_TOKEN }}
          LOG_LEVEL: "DEBUG"
          PYTHONUNBUFFERED: "1"
        run: |
          python main.py close-summary
