name: 采集股票价格数据

on:
  schedule:
    # 每天北京时间 05:00 执行 (UTC 21:00)
    # 美股收盘后约30分钟
    - cron: '0 21 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  collect-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行价格采集
        env:
          APP_ENV: "prod"
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_ID: "qwen3.5-flash"
          LLM_RULES_MODEL_ID: "qwen3.5-flash"
          LLM_BATCH_MODEL_ID: "qwen3.5-flash"
          LLM_SUMMARY_MODEL_ID: "qwen3.5-flash"
          LLM_DAILY_SUMMARY_MODEL_ID: "qwen3.5-flash"
          LLM_TIMEOUT: "60"
          LLM_RULES_TIMEOUT: "120"
          LLM_BATCH_TIMEOUT: "120"
          LLM_SUMMARY_TIMEOUT: "60"
          LLM_DAILY_SUMMARY_TIMEOUT: "120"
          DAILY_SUMMARY_TOTAL_CAP: "30"
          LLM_BATCH_SIZE: "6"
          LLM_MAX_WORKERS: "30"
          SKIP_LLM: "false"
          RULE_ACTIVE_STRATEGY: "C"
          EMBEDDING_SIMILARITY_THRESHOLD: "0.50"
          RULE_SCORE_WEIGHT: "0.02"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ENABLE_REMOTE_WRITE: "true"
          INGEST_API_BASE_URL: ${{ secrets.INGEST_API_BASE_URL }}
          INGEST_API_TOKEN: ${{ secrets.INGEST_API_TOKEN }}
          LOG_LEVEL: "INFO"
          PYTHONUNBUFFERED: "1"
        run: |
          python main.py close-summary
