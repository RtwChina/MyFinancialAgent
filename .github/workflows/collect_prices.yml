name: 采集股票价格数据

on:
  schedule:
    # 每天北京时间 05:00 执行 (UTC 21:00)
    # 美股收盘后约30分钟
    - cron: '0 21 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  collect-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行价格采集
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_ID: ${{ secrets.LLM_MODEL_ID }}
          SKIP_LLM: "true"
          ENABLE_REMOTE_WRITE: "true"
          INGEST_API_BASE_URL: ${{ secrets.INGEST_API_BASE_URL }}
          INGEST_API_TOKEN: ${{ secrets.INGEST_API_TOKEN }}
        run: |
          python main.py close-summary

      - name: 上传数据库文件
        uses: actions/upload-artifact@v4
        with:
          name: financial_data
          path: output/financial_data.db
          retention-days: 30

      - name: 上传日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: price_logs
          path: logs/
          retention-days: 7