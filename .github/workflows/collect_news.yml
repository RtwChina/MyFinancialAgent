name: 采集新闻数据

on:
  schedule:
    # 每2小时执行一次 (UTC 偶数小时整点)
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行新闻采集
        env:
          APP_ENV: "prod"
          # LLM API
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_ID: "qwen3.5-plus"
          LLM_RULES_MODEL_ID: "qwen3.5-plus"
          LLM_BATCH_MODEL_ID: "qwen3.5-flash"
          LLM_SUMMARY_MODEL_ID: "qwen3.5-flash"
          LLM_TIMEOUT: "60"
          LLM_RULES_TIMEOUT: "120"
          LLM_BATCH_TIMEOUT: "120"
          LLM_SUMMARY_TIMEOUT: "60"
          LLM_BATCH_SIZE: "6"
          LLM_MAX_WORKERS: "30"
          SKIP_LLM: "false"
          # Pipeline 三级漏斗参数（2026-03-21 回归测试确定）
          RULE_ACTIVE_STRATEGY: "C"
          EMBEDDING_SIMILARITY_THRESHOLD: "0.50"
          RULE_SCORE_WEIGHT: "0.02"
          # 外部数据源
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # 写入
          ENABLE_REMOTE_WRITE: "true"
          INGEST_API_BASE_URL: ${{ secrets.INGEST_API_BASE_URL }}
          INGEST_API_TOKEN: ${{ secrets.INGEST_API_TOKEN }}
          # 日志
          LOG_LEVEL: "INFO"
          PYTHONUNBUFFERED: "1"
        run: |
          python main.py hourly-news
