name: 采集新闻数据

on:
  schedule:
    # 每6小时执行一次 (UTC 0, 6, 12, 18)
    # 对应北京时间 8:00, 14:00, 20:00, 2:00
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 下载已有数据库
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: financial_data
          path: output/

      - name: 运行新闻采集
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_ID: ${{ secrets.LLM_MODEL_ID }}
          LLM_TIMEOUT: "120"
          LLM_MAX_RETRIES: "2"
          SKIP_LLM: "false"
          ENABLE_REMOTE_WRITE: "true"
          INGEST_API_BASE_URL: ${{ secrets.INGEST_API_BASE_URL }}
          INGEST_API_TOKEN: ${{ secrets.INGEST_API_TOKEN }}
        run: |
          python main.py

      - name: 上传数据库文件
        uses: actions/upload-artifact@v4
        with:
          name: financial_data
          path: output/financial_data.db
          retention-days: 30

      - name: 上传日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: news_logs
          path: logs/
          retention-days: 7