<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>历史复盘结构化解析 Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #fff;
      --line: #dbe1ea;
      --text: #172033;
      --muted: #667085;
      --accent: #2563eb;
      --warn: #b45309;
      --good: #15803d;
      --soft: #eef4ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, 0.95);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 18px;
      padding: 18px 24px 32px;
    }

    aside,
    .compare-panel,
    .summary-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    aside {
      position: sticky;
      top: 84px;
      align-self: start;
      overflow: hidden;
    }

    .date-button {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .date-button.active {
      background: var(--soft);
      color: #1d4ed8;
      font-weight: 700;
    }

    .date-button small {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-card {
      padding: 12px;
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .summary-card strong {
      font-size: 20px;
    }

    .compare-panel {
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: #ecfdf3;
      color: var(--good);
      border: 1px solid #bbf7d0;
    }

    .status.warn {
      background: #fffbeb;
      color: var(--warn);
      border-color: #fde68a;
    }

    .comparison {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      min-height: 0;
    }

    .raw,
    .structured {
      min-width: 0;
      padding: 12px;
      overflow: auto;
    }

    .raw {
      border-right: 1px solid var(--line);
      background: #fbfcfe;
    }

    .raw pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #334155;
    }

    .field-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field-tabs button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 7px 10px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    .field-tabs button.active {
      border-color: #93c5fd;
      background: var(--soft);
      color: #1d4ed8;
      font-weight: 700;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .section-title {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      font-weight: 800;
    }

    .subsection {
      margin: 12px;
      padding: 10px;
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      background: #f8fafc;
    }

    .subsection strong {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .subsection pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #334155;
      font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .diagnostics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 16px 14px;
    }

    .diag {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      background: #f1f5f9;
      color: #475569;
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }

      .summary-grid,
      .comparison {
        grid-template-columns: 1fr;
      }

      .raw {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>历史复盘结构化解析 Demo</h1>
    <p class="sub">来源：线上 D1 只读抽样，最近 8 条有大盘/板块内容的复盘。此页面只展示解析效果，不写生产库。</p>
  </header>
  <main>
    <aside id="dateList"></aside>
    <section>
      <div class="summary-grid">
        <div class="summary-card"><span>样本数</span><strong id="sampleCount">-</strong></div>
        <div class="summary-card"><span>一级块</span><strong id="sectionCount">-</strong></div>
        <div class="summary-card"><span>二级块</span><strong id="subsectionCount">-</strong></div>
        <div class="summary-card"><span>需人工关注</span><strong id="warningCount">-</strong></div>
      </div>
      <div class="compare-panel">
        <div class="panel-head">
          <h2 id="activeTitle">-</h2>
          <span id="qualityBadge" class="status">效果好</span>
        </div>
        <div class="field-tabs">
          <button id="marketTab" type="button" class="active">大盘盘点</button>
          <button id="rotationTab" type="button">板块轮动</button>
        </div>
        <div class="diagnostics" id="diagnostics"></div>
        <div class="comparison">
          <div class="raw"><pre id="rawText"></pre></div>
          <div class="structured" id="structuredView"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    let rows = [];
    let activeIndex = 0;
    let activeField = "market_sentiment";

    function stripNumberPrefix(title) {
      return String(title || "")
        .trim()
        .replace(/^\d+[.)、]?\s*/, "")
        .trim();
    }

    function splitHeadingIntro(title) {
      const cleaned = stripNumberPrefix(title);
      const match = cleaned.match(/^([^：:]{1,28})[：:]\s*(.+)$/);
      if (!match) return { title: cleaned, intro: "" };
      return { title: match[1].trim(), intro: match[2].trim() };
    }

    function splitLayerBullet(line) {
      const match = String(line || "").trim().match(/^[-*]\s*第[一二三四五六七八九十]+层[：:]\s*([^，。；:：]{2,28})[，。；:：]?\s*(.*)$/);
      if (!match) return null;
      const title = match[1].trim();
      const rest = match[2].trim();
      return {
        title,
        body: rest ? `${title}：${rest}` : title,
      };
    }

    function makeId(prefix, index, childIndex = null) {
      return childIndex == null ? `${prefix}-${index + 1}` : `${prefix}-${index + 1}-${childIndex + 1}`;
    }

    function normalizeBlocks(blocks) {
      return blocks
        .map((section, sectionIndex) => ({
          id: section.id || makeId("section", sectionIndex),
          title: stripNumberPrefix(section.title) || "未命名主题",
          children: (section.children || [])
            .map((child, childIndex) => ({
              id: child.id || makeId("sub", sectionIndex, childIndex),
              title: stripNumberPrefix(child.title) || "核心判断",
              body: String(child.body || "").trim(),
            }))
            .filter((child) => child.title || child.body),
        }))
        .filter((section) => section.title || section.children.length);
    }

    function cleanBodyLine(line) {
      return String(line || "")
        .replace(/^\s*[-*]\s*/, "")
        .trim();
    }

    function sectionText(section) {
      return [
        section.title,
        ...(section.children || []).flatMap((child) => [child.title, child.body]),
      ].filter(Boolean).join("\n");
    }

    function sectionSummary(section) {
      const title = String(section?.title || "").trim();
      const body = (section?.children || [])
        .map((child) => String(child.body || "").trim())
        .filter(Boolean)
        .join("\n");
      if (title && body) return `${title}：${body}`;
      return title || body;
    }

    function addChildIfBody(children, title, lines) {
      const body = (Array.isArray(lines) ? lines : [lines])
        .map(cleanBodyLine)
        .filter(Boolean)
        .join("\n");
      if (body) children.push({ title, body });
    }

    function splitLinesFromChildren(section) {
      return (section.children || [])
        .flatMap((child) => String(child.body || "").split(/\r?\n/))
        .map(cleanBodyLine)
        .filter(Boolean);
    }

    function mergeSpMacroCluster(blocks) {
      const result = [];
      for (let index = 0; index < blocks.length; index += 1) {
        const current = blocks[index];
        const next = blocks[index + 1];
        const third = blocks[index + 2];
        const currentTitle = String(current?.title || "");
        const nextText = sectionText(next || {});
        const thirdText = sectionText(third || {});
        const shouldMerge = /^标普\s*\d+/.test(currentTitle)
          && /十年期国债|国债/.test(nextText)
          && /海峡|重开|战争|布伦特|石油/.test(thirdText);

        if (!shouldMerge) {
          result.push(current);
          continue;
        }

        const children = [];
        const currentLines = splitLinesFromChildren(current);
        const gexLines = currentLines.filter((line) => /GEX|半导体/.test(line));
        const warLines = currentLines.filter((line) => /布伦特|石油|危机|战争/.test(line));
        const headline = currentTitle;

        addChildIfBody(children, "GEX", gexLines);
        addChildIfBody(children, "战争", [
          ...warLines,
          sectionSummary(third),
        ]);
        addChildIfBody(children, "国债", sectionSummary(next));

        result.push({
          title: `标普：${headline}`,
          children,
          migrationNote: "merged_sp_macro_cluster",
        });
        index += 2;
      }
      return result;
    }

    function normalizeMarketPointSections(blocks) {
      const childOrder = ["CTA", "JPM", "支撑"];
      return blocks
        .filter((section) => {
          const title = String(section.title || "");
          const onlyTreasuryRisk = /十年期国债|国债/.test(title)
            && (section.children || []).some((child) => /高危失控|强投机/.test(child.title));
          return !onlyTreasuryRisk;
        })
        .map((section) => {
          const title = String(section.title || "");
          if (!/标普500分析|标普500点位/.test(title)) return section;
          const children = (section.children || [])
            .filter((child) => !/加速卖出/.test(child.title))
            .map((child) => {
              if (/CTA/.test(child.title)) return { ...child, title: "CTA流动性" };
              if (/JPM/i.test(child.title)) return { ...child, title: child.title.replace(/\s+/g, " ").trim() };
              if (/支撑/.test(child.title)) return { ...child, title: "支撑" };
              return child;
            })
            .filter((child) => /CTA|JPM|支撑/.test(child.title))
            .sort((left, right) => {
              const leftIndex = childOrder.findIndex((key) => left.title.includes(key));
              const rightIndex = childOrder.findIndex((key) => right.title.includes(key));
              return (leftIndex === -1 ? 99 : leftIndex) - (rightIndex === -1 ? 99 : rightIndex);
            });
          return {
            ...section,
            title: "标普500点位",
            children,
            migrationNote: "normalized_sp500_points",
          };
        });
    }

    function parseMarkdown(text) {
      const raw = String(text || "").trim();
      if (!raw) return [];
      const sections = [];
      let currentSection = null;
      let currentChild = null;

      const ensureSection = () => {
        if (!currentSection) {
          currentSection = { title: "未分类", children: [] };
          sections.push(currentSection);
        }
        return currentSection;
      };

      const ensureChild = () => {
        const section = ensureSection();
        if (!currentChild) {
          currentChild = { title: "核心判断", body: "" };
          section.children.push(currentChild);
        }
        return currentChild;
      };

      for (const line of raw.split(/\r?\n/)) {
        const h2 = line.match(/^##\s+(.+)$/);
        const h1 = line.match(/^#\s+(.+)$/);
        if (h1) {
          const heading = splitHeadingIntro(h1[1]);
          currentSection = { title: heading.title || "未命名主题", children: [] };
          sections.push(currentSection);
          currentChild = null;
          if (heading.intro) {
            currentChild = { title: "核心判断", body: heading.intro };
            currentSection.children.push(currentChild);
          }
          continue;
        }
        if (h2) {
          const heading = splitHeadingIntro(h2[1]);
          const section = ensureSection();
          currentChild = { title: heading.title || "未命名维度", body: heading.intro || "" };
          section.children.push(currentChild);
          continue;
        }
        const layer = splitLayerBullet(line);
        if (layer && currentSection) {
          currentChild = { title: layer.title, body: layer.body };
          currentSection.children.push(currentChild);
          continue;
        }
        const child = ensureChild();
        child.body = child.body ? `${child.body}\n${line}` : line;
      }

      return normalizeMarketPointSections(mergeSpMacroCluster(normalizeBlocks(sections)));
    }

    function inspectBlocks(blocks, raw) {
      const warnings = [];
      if (!blocks.length && String(raw || "").trim()) warnings.push("纯文本兜底");
      for (const section of blocks) {
        if (!section.children.length) warnings.push(`"${section.title}" 没有二级块`);
        if (/操作计划|加仓|清空/.test(section.title)) warnings.push(`"${section.title}" 可能是历史操作计划内容`);
        for (const child of section.children) {
          if (!child.body) warnings.push(`"${section.title} / ${child.title}" 正文为空`);
        }
      }
      const quality = warnings.length ? "needs_review" : "good";
      return { quality, warnings };
    }

    function fieldLabel(field) {
      return field === "market_sentiment" ? "大盘盘点" : "板块轮动";
    }

    function renderDateList() {
      const container = document.querySelector("#dateList");
      container.innerHTML = "";
      rows.forEach((row, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `date-button ${index === activeIndex ? "active" : ""}`.trim();
        button.innerHTML = `<span>${row.archive_date}</span><small>${row.review_status}</small>`;
        button.addEventListener("click", () => {
          activeIndex = index;
          render();
        });
        container.appendChild(button);
      });
    }

    function renderSummary() {
      const parsed = rows.flatMap((row) => [
        ...parseMarkdown(row.market_sentiment),
        ...parseMarkdown(row.sector_rotation),
      ]);
      const sectionCount = parsed.length;
      const subsectionCount = parsed.reduce((sum, section) => sum + section.children.length, 0);
      const warningCount = rows.reduce((sum, row) => {
        return sum
          + inspectBlocks(parseMarkdown(row.market_sentiment), row.market_sentiment).warnings.length
          + inspectBlocks(parseMarkdown(row.sector_rotation), row.sector_rotation).warnings.length;
      }, 0);
      document.querySelector("#sampleCount").textContent = rows.length;
      document.querySelector("#sectionCount").textContent = sectionCount;
      document.querySelector("#subsectionCount").textContent = subsectionCount;
      document.querySelector("#warningCount").textContent = warningCount;
    }

    function renderStructured(blocks) {
      const container = document.querySelector("#structuredView");
      container.innerHTML = "";
      if (!blocks.length) {
        container.innerHTML = '<div class="subsection"><strong>暂无结构</strong><pre>原文为空或无法解析。</pre></div>';
        return;
      }
      blocks.forEach((section) => {
        const sectionEl = document.createElement("article");
        sectionEl.className = "section";
        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = section.title;
        sectionEl.appendChild(title);
        section.children.forEach((child) => {
          const childEl = document.createElement("div");
          childEl.className = "subsection";
          childEl.innerHTML = `<strong>${escapeHtml(child.title)}</strong><pre>${escapeHtml(child.body || "（空）")}</pre>`;
          sectionEl.appendChild(childEl);
        });
        container.appendChild(sectionEl);
      });
    }

    function renderDiagnostics(result) {
      const diagnostics = document.querySelector("#diagnostics");
      diagnostics.innerHTML = "";
      const items = result.warnings.length ? result.warnings : ["解析结构稳定"];
      items.forEach((text) => {
        const span = document.createElement("span");
        span.className = "diag";
        span.textContent = text;
        diagnostics.appendChild(span);
      });
    }

    function render() {
      renderDateList();
      renderSummary();
      const row = rows[activeIndex];
      const raw = row?.[activeField] || "";
      const blocks = parseMarkdown(raw);
      const result = inspectBlocks(blocks, raw);
      document.querySelector("#activeTitle").textContent = `${row.archive_date} · ${fieldLabel(activeField)}`;
      document.querySelector("#rawText").textContent = raw || "暂无原文";
      const badge = document.querySelector("#qualityBadge");
      badge.textContent = result.quality === "good" ? "效果好" : "需要人工调整";
      badge.classList.toggle("warn", result.quality !== "good");
      document.querySelector("#marketTab").classList.toggle("active", activeField === "market_sentiment");
      document.querySelector("#rotationTab").classList.toggle("active", activeField === "sector_rotation");
      renderDiagnostics(result);
      renderStructured(blocks);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    document.querySelector("#marketTab").addEventListener("click", () => {
      activeField = "market_sentiment";
      render();
    });
    document.querySelector("#rotationTab").addEventListener("click", () => {
      activeField = "sector_rotation";
      render();
    });

    fetch("./samples.json")
      .then((response) => response.json())
      .then((payload) => {
        rows = payload[0]?.results || [];
        render();
      })
      .catch((error) => {
        document.querySelector("#structuredView").textContent = `加载样本失败：${error.message}`;
      });
  </script>
</body>
</html>
