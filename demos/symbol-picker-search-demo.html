<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>标的搜索选择器 Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-soft: #f8fafb;
      --line: #dbe2e8;
      --line-strong: #c8d2dc;
      --text: #17212b;
      --muted: #6a7885;
      --faint: #8a96a3;
      --green: #0f8f61;
      --green-soft: #e9f7f1;
      --blue: #2164b0;
      --blue-soft: #eaf2fb;
      --amber: #aa6a00;
      --amber-soft: #fff4df;
      --red: #b74242;
      --shadow: 0 18px 40px rgba(26, 38, 51, 0.12);
      --radius: 8px;
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0)),
        repeating-linear-gradient(90deg, rgba(23,33,43,0.025) 0 1px, transparent 1px 80px),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100vw - 36px));
      margin: 28px auto 40px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .title-block {
      display: grid;
      gap: 5px;
    }

    .eyebrow {
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .trade-date {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 28px rgba(38, 53, 68, 0.08);
      overflow: visible;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
      position: relative;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: #42505e;
      font-size: 12px;
      font-weight: 800;
    }

    .control,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: #fff;
      padding: 10px 11px;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .control:focus,
    textarea:focus,
    .symbol-trigger.open {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(15, 143, 97, 0.12);
    }

    .symbol-trigger {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      cursor: pointer;
      min-height: 46px;
    }

    .selected-symbol {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .ticker {
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .name {
      color: var(--muted);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge.us {
      background: var(--blue-soft);
      color: var(--blue);
      border-color: #cfe0f4;
    }

    .badge.cn {
      background: #f7ecff;
      color: #7a3a9b;
      border-color: #ead5f7;
    }

    .badge.sector {
      background: var(--amber-soft);
      color: var(--amber);
      border-color: #f3d59b;
    }

    .badge.index {
      background: #eef2f5;
      color: #566473;
      border-color: #dbe2e8;
    }

    .chevron {
      color: var(--faint);
      font-weight: 900;
      transform: translateY(-1px);
    }

    .picker-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 20;
      display: none;
      max-height: 540px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .picker-popover.open {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .search-row {
      position: relative;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .search-input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      padding: 0 12px 0 34px;
      outline: none;
      background: var(--panel-soft);
      color: var(--text);
    }

    .search-input:focus {
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(15, 143, 97, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 24px;
      top: 23px;
      width: 13px;
      height: 13px;
      border: 2px solid #7c8b98;
      border-radius: 50%;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -6px;
      bottom: -5px;
      width: 7px;
      height: 2px;
      background: #7c8b98;
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      background: #fbfcfd;
    }

    .filter-chip {
      height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 0 10px;
      background: #fff;
      color: #445360;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }

    .filter-chip.active {
      background: #15202b;
      border-color: #15202b;
      color: #fff;
    }

    .result-list {
      overflow: auto;
      max-height: 392px;
      padding: 7px 0 10px;
    }

    .group {
      display: grid;
      gap: 2px;
      padding: 4px 8px 8px;
    }

    .group-header {
      position: sticky;
      top: -7px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 8px 6px;
      background: rgba(255,255,255,0.96);
      color: #596774;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #edf1f4;
    }

    .group-count {
      color: var(--faint);
      letter-spacing: 0;
      text-transform: none;
    }

    .result-row {
      display: grid;
      grid-template-columns: minmax(72px, 0.6fr) minmax(150px, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 46px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      padding: 8px;
      text-align: left;
      color: inherit;
      cursor: pointer;
    }

    .result-row:hover,
    .result-row.active {
      background: #eef7f3;
    }

    .result-row .name {
      font-size: 13px;
    }

    .alias {
      color: var(--faint);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      margin: 20px 14px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--muted);
      text-align: center;
      background: var(--panel-soft);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .table th,
    .table td {
      border-bottom: 1px solid var(--line);
      padding: 11px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    .table th {
      color: #4a5865;
      font-size: 12px;
      background: #fbfcfd;
    }

    .table col.symbol-col {
      width: 150px;
    }

    .table col.action-col {
      width: 112px;
    }

    .table td {
      color: #263340;
    }

    .side-panel {
      display: grid;
      gap: 14px;
    }

    .preview-card {
      padding: 16px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--panel-soft);
    }

    .metric-value {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
      font-weight: 900;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .selected-details {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .detail-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid #edf1f4;
      padding-bottom: 9px;
      font-size: 13px;
    }

    .detail-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .detail-row span:first-child {
      color: var(--muted);
      font-weight: 700;
    }

    .detail-row span:last-child {
      text-align: right;
      font-weight: 800;
    }

    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100vw - 20px, 1180px);
        margin-top: 14px;
      }

      .result-row {
        grid-template-columns: 78px 1fr;
      }

      .result-row .badge {
        grid-column: 2;
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="title-block">
        <div class="eyebrow">Action Plan Symbol Picker</div>
        <h1>个股与资产操作计划</h1>
      </div>
      <div class="trade-date">账户管理 · 活态计划 · 2026-05-28</div>
    </div>

    <section class="workspace">
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">新增 / 修改操作计划</h2>
          <span class="status-pill">活态同步</span>
        </div>

        <div class="form-grid">
          <div class="field full" id="symbolField">
            <label for="symbolSearch">标的</label>
            <button class="control symbol-trigger" id="symbolTrigger" type="button" aria-expanded="false">
              <span class="selected-symbol" id="selectedSymbol"></span>
              <span class="chevron">⌄</span>
            </button>

            <div class="picker-popover" id="pickerPopover">
              <div class="search-row">
                <span class="search-icon" aria-hidden="true"></span>
                <input class="search-input" id="symbolSearch" type="search" autocomplete="off" placeholder="搜索代码、名称、别名" />
              </div>
              <div class="filter-row" id="filterRow"></div>
              <div class="result-list" id="resultList"></div>
            </div>
          </div>

          <div class="field">
            <label>动作</label>
            <select class="control">
              <option>准备开仓</option>
              <option selected>持仓观察</option>
              <option>减仓</option>
              <option>已清仓复盘</option>
            </select>
          </div>

          <div class="field">
            <label>当前仓位</label>
            <select class="control">
              <option>0-5%</option>
              <option selected>5-10%</option>
              <option>10-20%</option>
              <option>20%+</option>
            </select>
          </div>

          <div class="field full">
            <label>入场 / 调仓计划</label>
            <textarea>回踩关键均线后观察量能，若强于同组标的再分批加仓。</textarea>
          </div>
        </div>

        <table class="table" aria-label="当前操作计划">
          <colgroup>
            <col class="symbol-col" />
            <col class="action-col" />
            <col />
          </colgroup>
          <thead>
            <tr>
              <th>标的 / 动作</th>
              <th>仓位</th>
              <th>计划摘要</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>NVDA</strong><br><span class="badge us">美股个股</span></td>
              <td>10-20%</td>
              <td>趋势未破坏，财报窗口前不追高。</td>
            </tr>
            <tr>
              <td><strong>机器人</strong><br><span class="badge sector">板块 ETF</span></td>
              <td>5-10%</td>
              <td>主题活跃度回升时优先观察龙头扩散。</td>
            </tr>
          </tbody>
        </table>
      </div>

      <aside class="side-panel">
        <div class="panel preview-card">
          <div class="panel-title">当前选择</div>
          <div class="selected-details" id="selectedDetails"></div>
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-value" id="groupCount">4</span>
              <span class="metric-label">分组</span>
            </div>
            <div class="metric">
              <span class="metric-value" id="visibleCount">0</span>
              <span class="metric-label">可见标的</span>
            </div>
            <div class="metric">
              <span class="metric-value">1</span>
              <span class="metric-label">一次选择</span>
            </div>
          </div>
        </div>

        <div class="panel preview-card">
          <div class="panel-title">搜索样例</div>
          <div class="selected-details">
            <div class="detail-row"><span>输入 nv</span><span>NVDA / NVIDIA</span></div>
            <div class="detail-row"><span>输入 银行</span><span>银行板块 / 招商银行</span></div>
            <div class="detail-row"><span>输入 300</span><span>沪深300 / 创业板指</span></div>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const groups = [
      { key: "us", label: "美股个股", badge: "us" },
      { key: "cn", label: "大A个股", badge: "cn" },
      { key: "sector", label: "板块 / ETF", badge: "sector" },
      { key: "index", label: "大盘 / 指数", badge: "index" },
    ];

    const symbols = [
      { symbol: "AAPL", name: "Apple Inc.", group: "us", aliases: "苹果 iphone mac nasdaq" },
      { symbol: "NVDA", name: "NVIDIA Corporation", group: "us", aliases: "英伟达 gpu ai cuda" },
      { symbol: "TSLA", name: "Tesla Inc.", group: "us", aliases: "特斯拉 ev musk" },
      { symbol: "MSFT", name: "Microsoft Corporation", group: "us", aliases: "微软 azure openai" },
      { symbol: "BABA", name: "Alibaba Group", group: "us", aliases: "阿里巴巴 中概 电商" },
      { symbol: "600519", name: "贵州茅台", group: "cn", aliases: "白酒 消费 沪市" },
      { symbol: "300750", name: "宁德时代", group: "cn", aliases: "电池 新能源 创业板" },
      { symbol: "600036", name: "招商银行", group: "cn", aliases: "银行 金融 沪市" },
      { symbol: "000858", name: "五粮液", group: "cn", aliases: "白酒 深市 消费" },
      { symbol: "512480", name: "半导体ETF", group: "sector", aliases: "芯片 半导体 etf 科技" },
      { symbol: "机器人", name: "机器人产业链", group: "sector", aliases: "具身智能 工业自动化 humanoid" },
      { symbol: "银行板块", name: "银行与保险", group: "sector", aliases: "金融 低估值 分红" },
      { symbol: "新能源车", name: "新能源车产业链", group: "sector", aliases: "锂电 ev 汽车" },
      { symbol: "SPY", name: "S&P 500 ETF", group: "index", aliases: "标普500 大盘 美股指数" },
      { symbol: "QQQ", name: "Nasdaq 100 ETF", group: "index", aliases: "纳指100 科技 大盘" },
      { symbol: "000300", name: "沪深300", group: "index", aliases: "a股 大盘 指数" },
      { symbol: "399006", name: "创业板指", group: "index", aliases: "成长 创业板 大盘" },
    ];

    const trigger = document.querySelector("#symbolTrigger");
    const popover = document.querySelector("#pickerPopover");
    const selectedSymbol = document.querySelector("#selectedSymbol");
    const selectedDetails = document.querySelector("#selectedDetails");
    const resultList = document.querySelector("#resultList");
    const searchInput = document.querySelector("#symbolSearch");
    const filterRow = document.querySelector("#filterRow");
    const visibleCount = document.querySelector("#visibleCount");

    let selected = symbols[1];
    let activeFilter = "all";

    function groupFor(item) {
      return groups.find((group) => group.key === item.group) || groups[0];
    }

    function searchableText(item) {
      return `${item.symbol} ${item.name} ${item.aliases}`.toLowerCase();
    }

    function renderSelected() {
      const group = groupFor(selected);
      selectedSymbol.innerHTML = `
        <span class="ticker">${selected.symbol}</span>
        <span class="name">${selected.name}</span>
        <span class="badge ${group.badge}">${group.label}</span>
      `;
      selectedDetails.innerHTML = `
        <div class="detail-row"><span>代码</span><span>${selected.symbol}</span></div>
        <div class="detail-row"><span>名称</span><span>${selected.name}</span></div>
        <div class="detail-row"><span>类型</span><span>${group.label}</span></div>
        <div class="detail-row"><span>匹配别名</span><span>${selected.aliases}</span></div>
      `;
    }

    function renderFilters() {
      const filterItems = [{ key: "all", label: "全部" }, ...groups];
      filterRow.innerHTML = filterItems.map((item) => `
        <button class="filter-chip ${item.key === activeFilter ? "active" : ""}" type="button" data-filter="${item.key}">
          ${item.label}
        </button>
      `).join("");
      filterRow.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          activeFilter = button.dataset.filter;
          renderFilters();
          renderResults();
        });
      });
    }

    function renderResults() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = symbols.filter((item) => {
        const filterMatches = activeFilter === "all" || item.group === activeFilter;
        const queryMatches = !query || searchableText(item).includes(query);
        return filterMatches && queryMatches;
      });

      visibleCount.textContent = filtered.length;

      if (!filtered.length) {
        resultList.innerHTML = `<div class="empty">没有匹配的标的</div>`;
        return;
      }

      resultList.innerHTML = groups.map((group) => {
        const items = filtered.filter((item) => item.group === group.key);
        if (!items.length) return "";
        return `
          <section class="group">
            <div class="group-header">
              <span>${group.label}</span>
              <span class="group-count">${items.length} 个</span>
            </div>
            ${items.map((item) => `
              <button class="result-row ${item.symbol === selected.symbol ? "active" : ""}" type="button" data-symbol="${item.symbol}">
                <span class="ticker">${item.symbol}</span>
                <span>
                  <span class="name">${item.name}</span><br>
                  <span class="alias">${item.aliases}</span>
                </span>
                <span class="badge ${group.badge}">${group.label}</span>
              </button>
            `).join("")}
          </section>
        `;
      }).join("");

      resultList.querySelectorAll(".result-row").forEach((row) => {
        row.addEventListener("click", () => {
          selected = symbols.find((item) => item.symbol === row.dataset.symbol) || selected;
          closePicker();
          renderSelected();
          renderResults();
        });
      });
    }

    function openPicker() {
      popover.classList.add("open");
      trigger.classList.add("open");
      trigger.setAttribute("aria-expanded", "true");
      setTimeout(() => searchInput.focus(), 0);
    }

    function closePicker() {
      popover.classList.remove("open");
      trigger.classList.remove("open");
      trigger.setAttribute("aria-expanded", "false");
    }

    trigger.addEventListener("click", () => {
      if (popover.classList.contains("open")) {
        closePicker();
      } else {
        openPicker();
      }
    });

    searchInput.addEventListener("input", renderResults);
    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closePicker();
    });

    document.addEventListener("click", (event) => {
      if (!document.querySelector("#symbolField").contains(event.target)) {
        closePicker();
      }
    });

    renderSelected();
    renderFilters();
    renderResults();
  </script>
</body>
</html>
