<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>方案3：现代毛玻璃工作台</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* 使用了一个具有流动感的深蓝色渐变背景 */
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* 侧边导航栏 */
        .sidebar {
            width: 200px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            height: 400px;
            border-radius: 24px 0 0 24px;
        }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
        }

        /* 主内容区 */
        .main-container {
            width: 600px;
            height: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 0 24px 24px 0;
            padding: 40px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        /* 状态标签 */
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
        }

        .content-header {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .quote {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            padding-left: 20px;
            border-left: 2px solid var(--accent-color);
        }

        .footer-link {
            margin-top: auto;
            text-align: right;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active">新闻检索</div>
        <div class="nav-item">复盘工作台</div>
    </div>

    <div class="main-container">
        <div class="badge">测试环境</div>
        <div class="content-header">每日一句</div>
        <div class="title">投资心态建设</div>
        <div class="quote">
            计划不是死的，边看市场边微调仓位，让自己始终站在有利一边。
        </div>
        <a href="#" class="footer-link">查看全文 →</a>
    </div>

</body>
</html>
